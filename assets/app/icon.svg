<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background: dark rounded square -->
  <rect width="512" height="512" rx="96" fill="#1c1c2e"/>

  <!-- Outer lens ring -->
  <circle cx="256" cy="256" r="178" fill="none" stroke="#2a82da" stroke-width="16"/>

  <!-- Lens glass (subtle radial fill) -->
  <circle cx="256" cy="256" r="160" fill="#0d1525"/>

  <!-- Aperture blades (6-blade iris, built from rotated rectangles) -->
  <g transform="translate(256,256)">
    <ellipse rx="55" ry="130" fill="#1a2a50" opacity="0.85" transform="rotate(0)"/>
    <ellipse rx="55" ry="130" fill="#1a2a50" opacity="0.85" transform="rotate(60)"/>
    <ellipse rx="55" ry="130" fill="#1a2a50" opacity="0.85" transform="rotate(120)"/>
  </g>

  <!-- Inner iris ring -->
  <circle cx="256" cy="256" r="96" fill="#0a0f1e"/>
  <circle cx="256" cy="256" r="96" fill="none" stroke="#2a82da" stroke-width="6" opacity="0.7"/>

  <!-- Pupil -->
  <circle cx="256" cy="256" r="48" fill="#060c18"/>

  <!-- Primary specular highlight -->
  <circle cx="292" cy="220" r="26" fill="white" opacity="0.45"/>
  <!-- Secondary specular highlight -->
  <circle cx="308" cy="208" r="10" fill="white" opacity="0.65"/>

  <!-- Lens coating reflection arc -->
  <path d="M 138 200 A 130 130 0 0 1 256 126" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.15"/>
</svg>
